<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Energy IDC</title>
    <link rel="icon" href="./global assets/Images/logo.webp">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        @media screen and (min-width: 992px) {
            body {
                overflow: hidden;
            }
        }

        #content {
            width: 100%;
            margin: 0 auto;
        }

        #content object {
            width: 100%;
            height: 100%;
            border: none;
            min-height: 100vh;
        }

        /* ==================== DNA HELIX PRELOADER ==================== */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #d8fdf9 0%, #f8fffd 50%, #9ebbb1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999999999;
            overflow: hidden;
            transition: opacity 0.8s ease-out;
        }

        .dna-container {
            position: relative;
            width: 120px;
            height: 150px;
            perspective: 500px;
        }

        .dna-strand {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateDNA 3s linear infinite;
        }

        @keyframes rotateDNA {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .dna-pair {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform-style: preserve-3d;
        }

        .dna-pair:nth-child(1) { top: 0%; }
        .dna-pair:nth-child(2) { top: 14%; transform: rotateY(45deg); }
        .dna-pair:nth-child(3) { top: 28%; transform: rotateY(90deg); }
        .dna-pair:nth-child(4) { top: 42%; transform: rotateY(135deg); }
        .dna-pair:nth-child(5) { top: 56%; transform: rotateY(180deg); }
        .dna-pair:nth-child(6) { top: 70%; transform: rotateY(225deg); }
        .dna-pair:nth-child(7) { top: 84%; transform: rotateY(270deg); }

        .dna-node {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }

        .dna-node.left {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #22c55e;
        }

        .dna-node.right {
            background: linear-gradient(135deg, #14b8a6, #5eead4);
            color: #14b8a6;
        }

        .dna-connector {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #22c55e, #14b8a6);
            opacity: 0.5;
        }

        .center-logo {
            margin-top: 30px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #e6e6e6;
            border: 2px solid rgba(34, 197, 94, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoGlow 3s ease-in-out infinite;
        }

        .center-logo img {
            width: 100px;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
            50%       { box-shadow: 0 0 10px rgba(34, 197, 94, 0.6), 0 0 20px rgba(20, 184, 166, 0.4); }
        }

        .loader-text {
            margin-top: 30px;
            text-align: center;
        }

        .loader-text h2 {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #126e34, #0c5e54, #12632f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 3s linear infinite;
        }

        @keyframes textShine {
            from { background-position: 0% center; }
            to   { background-position: 200% center; }
        }

        .loader-text p {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: #000000;
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 1.5px;
        }

        .progress-line {
            margin-top: 30px;
            width: 200px;
            height: 3.5px;
            background: #bebebe;
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-line::after {
            content: '';
            display: block;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #199c49, #0f8b7d, transparent);
            animation: progressSlide 1.5s ease-in-out infinite;
        }

        @keyframes progressSlide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #2bbd60;
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 10s linear infinite;
        }

        .bg-particle:nth-child(odd) { background: #14b8a6; }

        .bg-particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .bg-particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 1s; }
        .bg-particle:nth-child(3) { left: 30%; top: 40%; animation-delay: 2s; }
        .bg-particle:nth-child(4) { left: 50%; top: 10%; animation-delay: 3s; }
        .bg-particle:nth-child(5) { left: 60%; top: 60%; animation-delay: 4s; }
        .bg-particle:nth-child(6) { left: 70%; top: 30%; animation-delay: 5s; }
        .bg-particle:nth-child(7) { left: 80%; top: 70%; animation-delay: 6s; }
        .bg-particle:nth-child(8) { left: 90%; top: 50%; animation-delay: 7s; }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0);      opacity: 0.3; }
            25%       { transform: translate(10px, -20px); opacity: 0.6; }
            50%       { transform: translate(-10px, -10px); opacity: 0.3; }
            75%       { transform: translate(5px, 10px);  opacity: 0.6; }
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- ✅ STEP 1: Preloader is now uncommented and always visible on load -->
    <div id="preloader">
        <div class="bg-particles">
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
            <div class="bg-particle"></div>
        </div>

        <div class="center-logo">
            <img src="./global assets/Images/logo.webp" alt="Logo">
        </div>

        <div class="loader-text">
            <p>Loading</p>
        </div>

        <div class="progress-line"></div>
    </div>

    <div id="content"></div>

    <script>
        const preloader  = document.getElementById("preloader");
        const contentDiv = document.getElementById("content");

        // ✅ STEP 2: Single flag — triggers after first image loads + 3s delay
        let hideScheduled = false;

        function scheduleHide() {
            if (hideScheduled) return;   // run only once
            hideScheduled = true;

            // ✅ STEP 3: Wait 3 seconds after first image is detected, then hide
            setTimeout(showContent, 3000);
        }

        // ✅ STEP 4: Watch the iframe for its first image to load
        function waitForFirstImageInIframe(objectEl) {
            try {
                const iframeDoc = objectEl.contentDocument || objectEl.contentWindow?.document;
                if (!iframeDoc) { scheduleHide(); return; }

                const images = iframeDoc.getElementsByTagName('img');

                if (images.length === 0) {
                    // No images at all — just wait for iframe load then hide
                    scheduleHide();
                    return;
                }

                // Listen for the FIRST image to finish loading
                Array.from(images).forEach((img) => {
                    if (img.complete && img.naturalHeight !== 0) {
                        scheduleHide();   // already loaded
                    } else {
                        img.addEventListener('load',  scheduleHide, { once: true });
                        img.addEventListener('error', scheduleHide, { once: true });
                    }
                });

            } catch (err) {
                console.error('Iframe access error:', err);
                scheduleHide();
            }
        }

        // ✅ STEP 5: Load the content page
        function load_home() {
            var folderPath = 'For_Desc/index.html';
            contentDiv.innerHTML = '<object type="text/html" data="' + folderPath + '" style="width:100%; height:600px;"></object>';

            const objectEl = contentDiv.querySelector('object');

            if (objectEl) {
                objectEl.addEventListener('load', function () {
                    // Give browser a moment to parse iframe DOM before checking images
                    setTimeout(() => waitForFirstImageInIframe(objectEl), 300);
                });

                // ✅ STEP 6: Hard fallback — never show preloader longer than 12 seconds
                setTimeout(() => scheduleHide(), 12000);
            }
        }

        // ✅ STEP 7: Fade out and remove the preloader
        function showContent() {
            preloader.classList.add("fade-out");
            setTimeout(() => {
                preloader.style.display = "none";
            }, 800);
        }

        // Fullscreen passthrough
        const embedded = document.getElementById("content");
        window.addEventListener("message", function (event) {
            if (event.data && event.data.action === "toggleFullscreen") {
                if (!document.fullscreenElement) {
                    embedded.requestFullscreen?.() || embedded.webkitRequestFullscreen?.();
                } else {
                    document.exitFullscreen?.();
                }
            }
        });

        window.onload = load_home;

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' ||
                e.key === 'ArrowDown'  || e.key === 'ArrowUp') {
                e.preventDefault();
            }

            if (e.target.matches('input, textarea')) return;

            const objectEl = document.querySelector('#content object');
            if (!objectEl) return;

            switch(e.key) {
                case 'ArrowRight':
                case 'ArrowDown':
                    objectEl.contentWindow.postMessage({ action: 'flipNext' }, '*');
                    break;
                case 'ArrowLeft':
                case 'ArrowUp':
                    objectEl.contentWindow.postMessage({ action: 'flipPrev' }, '*');
                    break;
                case 'Home':
                    objectEl.contentWindow.postMessage({ action: 'flipFirst' }, '*');
                    break;
                case 'End':
                    objectEl.contentWindow.postMessage({ action: 'flipLast' }, '*');
                    break;
            }
        });
    </script>
</body>
</html>
